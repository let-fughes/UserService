name: CI Pipeline

on:
  push:
    branches: [ main, UserService ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: UserService
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean compile -DskipTests

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          target/classes/
          target/generated-sources/

  test:
    name: Testing
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shopdb
          POSTGRES_USER: shop_user
          POSTGRES_PASSWORD: shop_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        ref: UserService
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: target/

    - name: Run unit tests
      run: mvn test -DskipITs
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/shopdb
        DATABASE_USERNAME: shop_user
        DATABASE_PASSWORD: shop_password
        SPRING_DATA_REDIS_HOST: localhost
        SPRING_DATA_REDIS_PORT: 6379

    - name: Run integration tests
      run: mvn verify -DskipUnitTests
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/shopdb
        DATABASE_USERNAME: shop_user
        DATABASE_PASSWORD: shop_password
        SPRING_DATA_REDIS_HOST: localhost
        SPRING_DATA_REDIS_PORT: 6379

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/failsafe-reports/
        retention-days: 30

    - name: Upload test coverage
      uses: actions/upload-artifact@v4
      with:
        ref: UserService
        name: coverage-report
        path: target/site/jacoco/
        retention-days: 30

  code-analysis:
    name: Code Analysis (SonarQube)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: UserService
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: target/

    - name: Cache SonarQube packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: SonarQube Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=shop-app \
          -Dsonar.projectName='Shop Application' \
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
          -Dsonar.java.coveragePlugin=jacoco

    - name: Quality Gate Check
      uses: sonarsource/sonarqube-quality-gate-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build:
    name: Artifact Creation (Docker Image)
    runs-on: ubuntu-latest
    needs: code-analysis
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        ref: UserService
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build application
      run: mvn clean package -DskipTests

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate deployment manifest
      run: |
        cat > docker-compose.ci.yml << EOF
        version: '3.8'
        services:
          app:
            image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            environment:
              - SPRING_PROFILES_ACTIVE=prod
              - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shopdb
              - DATABASE_USERNAME=shop_user
              - DATABASE_PASSWORD=shop_password
              - SPRING_DATA_REDIS_HOST=redis
            ports:
              - "8080:8080"
          postgres:
            image: postgres:16-alpine
            environment:
              - POSTGRES_DB=shopdb
              - POSTGRES_USER=shop_user
              - POSTGRES_PASSWORD=shop_password
          redis:
            image: redis:7.2-alpine
        EOF

    - name: Upload Docker artifacts
      uses: actions/upload-artifact@v4
      with:
        name: docker-artifacts
        path: |
          docker-compose.ci.yml
        retention-days: 30
